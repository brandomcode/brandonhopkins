<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brandon Hopkins</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" id="favicon">

  <!-- OG -->
  <meta property="og:title" content="Brandon Hopkins">
  <meta property="og:description" content="British composer based in London.">
  <meta property="og:image" content="https://brandonhopkins.co.uk/og-image.png">
  <meta property="og:url" content="https://brandonhopkins.co.uk">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- MOBILE HEADER -->
  <header class="mobile-header">
    <span class="mobile-title">Brandon Hopkins</span>
    <button class="menu-btn" id="menuBtn">Menu</button>

  <!-- MOBILE MENU OVERLAY -->
  <div class="mobile-menu" id="mobileMenu">

      <span class="mobile-title">Brandon Hopkins</span>
      <button class="menu-btn" id="closeBtn">Close</button>
    </div>

  </div>

  <!-- MOBILE CONTENT -->
  <main class="mobile-content active" id="mobileContent"></main>

  <!-- DESKTOP LAYOUT -->
  <div class="layout">
    <div class="col" id="leftCol">
      <div class="col-inner">
        <h1 class="site-title">Brandon Hopkins</h1>
        <nav id="desktopNav"></nav>
      </div>
    </div>
    <div class="col" id="rightCol">
      <div class="col-inner" id="rightColInner"></div>
    </div>
  </div>

  <script src="script.js"></script>
